# Development profile properties (application-dev.properties)
# Local development - matches previous application.properties values

spring.datasource.url=jdbc:postgresql://localhost:5432/finance_manager
spring.datasource.username=postgres
spring.datasource.password=suriya227
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true

# Development JWT (in real projects do NOT commit secrets)
jwt.secret=this-is-a-very-long-secret-key-at-least-32-chars
jwt.expiration=86400000

# Frontend URL used in password reset links
app.frontend.url=http://localhost:5000

# Mail (not configured in dev — reset links are printed to console logs instead)
# To test real email sending, set spring.mail.host and credentials below
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your@gmail.com
# spring.mail.password=your-app-password
# spring.mail.from=your@gmail.com
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# Verbose logging for dev
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

