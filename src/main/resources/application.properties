# Common application properties
spring.application.name=Finance Manager

# Activate a Spring profile via environment variable SPRING_PROFILES_ACTIVE; default to 'dev'
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server defaults (can be overridden by profiles)
server.port=8080

# Logging defaults
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# Note: database, JWT, and other environment-specific settings are provided in profile-specific files
