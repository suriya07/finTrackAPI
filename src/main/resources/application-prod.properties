# Production profile properties (application-prod.properties)
# IMPORTANT: Do not hardcode secrets here. Prefer environment variables or an external secrets manager.

# Example: use environment variables to supply sensitive values
#spring.datasource.url=${PROD_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_manager}
#spring.datasource.username=${PROD_DATASOURCE_USERNAME:postgres}
#spring.datasource.password=${PROD_DATASOURCE_PASSWORD:}

# Alternative approach using individual variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# In production, we typically don't use 'update' for ddl-auto
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway should be enabled in prod by default
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT secret must be supplied via environment variable
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Frontend URL used in password reset links
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Mail (SMTP) — supply via environment variables
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.from=${MAIL_FROM}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging tuning for production
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

